name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Windows / Python 3.13
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run lint and type checks
        shell: pwsh
        run: .\rtk.ps1 check

      - name: Run engine boundaries check
        shell: pwsh
        run: .\rtk.ps1 boundaries

      - name: Run tests
        shell: pwsh
        run: .\rtk.ps1 test
