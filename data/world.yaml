rumors:
  roads_that_repeat:
    id: roads_that_repeat
    title: Past The Dry Creek
    text: A townsman says the cave is past the dry creek. Look for black stones. Do not follow the birds unless you want wolves.
    source: Haven east gate
    act: 1
    tags: [overworld, maze_leak]
  caves_count_companies:
    id: caves_count_companies
    title: Caves Count Companies
    text: Someone has been marking how many crews enter the Shallow Cave, and the freshest marks are not miner tallies.
    source: fungus-lit cave wall
    act: 1
    tags: [overworld, cave, warning]
  maze_profit_invites:
    id: maze_profit_invites
    title: Profit Invites The Maze
    text: Every paid expedition makes the impossible place easier to find again.
    source: unnamed survivor
    act: 1
    tags: [maze, economy, warning]
