maze_name: Pandora's Maze
starting_settlement: haven
difficulty:
  id: hard_default
  name: Hard Default
  summary: Expeditions are meant to be survivable, not forgiving.
  principles:
    - Ordinary recruits can die before they become legends.
    - Good preparation should improve odds, not guarantee safety.
    - Retreat and restraint should be valid company decisions.
    - The Maze pays best when the company is most tempted to overreach.
locations:
  haven:
    id: haven
    name: Haven Town
    kind: frontier_settlement
    act: 1
    description: A charter town with cheap beds, road contracts, and more debt than glory.
    tags: [frontier, settlement, charter]
  old_road:
    id: old_road
    name: Old Road
    kind: overworld_route
    act: 1
    description: A neglected trade road where the first company contracts are posted.
    tags: [overworld, road, contract]
  blackwood_forest:
    id: blackwood_forest
    name: Blackwood Forest
    kind: overworld_wilds
    act: 1
    description: Pines, missing wagons, animal trails, and routes that sometimes repeat.
    tags: [overworld, forest, maze_leak]
  shallow_cave:
    id: shallow_cave
    name: Shallow Cave
    kind: overworld_dungeon
    act: 1
    description: A local hazard with one wall that has started behaving like a door.
    tags: [overworld, cave, breach]
  shallow_cave_breach:
    id: shallow_cave_breach
    name: Shallow Cave Breach
    kind: maze_leak
    act: 1
    description: A cold chamber where the company first proves the Maze is not only rumor.
    tags: [maze, breach, leak]
  maze_capital:
    id: maze_capital
    name: The Deep Gate Market
    kind: future_city
    act: 2
    description: A wealthy town built around the deepest known Maze entrance.
    tags: [future, settlement, extraction, maze]
  pandoras_maze_depth_1:
    id: pandoras_maze_depth_1
    name: Pandora's Maze Depth 1
    kind: maze_region
    act: 2
    description: The first stable rooms below the exploited frontier.
    tags: [future, maze]
